name: Fusion Automatique des Radars

on:
  push:
    paths:
      - 'data/**' # Se déclenche uniquement si le dossier data est modifié

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Executer le script de fusion
        run: python merge_kml.py

      - name: Commit et Push du fichier JSON mis à jour
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add radars_complet.json
          git commit -m "Mise à jour automatique de la base radar" || exit 0
          git push
