<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesla Navigation</title>

  <!-- MapLibre GL JS -->
  <link href="https://unpkg.com/maplibre-gl@5.20.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.20.1/dist/maplibre-gl.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --red: #e82127;
      --red-dim: rgba(232,33,39,0.12);
      --red-glow: rgba(232,33,39,0.4);
      --dark: #080808;
      --s1: #101010;
      --s2: #181818;
      --s3: #202020;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #efefef;
      --muted: #555;
      --muted2: #888;
      --blue: #44aaff;
      --green: #2ecc71;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:var(--dark); color:var(--text); font-family:'DM Sans',sans-serif; overflow:hidden; }
    #app { display:flex; height:100vh; }

    /* SIDEBAR */
    #sidebar { width:360px; min-width:360px; background:var(--s1); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:10; overflow:hidden; }

    #header { padding:20px 22px 16px; border-bottom:1px solid var(--border); }
    .logo-row { display:flex; align-items:center; gap:12px; }
    .logo-t { font-family:'Orbitron',monospace; font-size:28px; font-weight:800; color:var(--red); filter:drop-shadow(0 0 10px var(--red-glow)); line-height:1; }
    .logo-text { font-family:'Orbitron',monospace; font-size:16px; font-weight:800; letter-spacing:5px; color:var(--text); }
    .logo-tag { font-size:10px; color:var(--muted2); letter-spacing:3px; text-transform:uppercase; margin-top:4px; margin-left:44px; }

    #vehicle-bar { display:flex; gap:6px; padding:12px 22px; border-bottom:1px solid var(--border); overflow-x:auto; }
    #vehicle-bar::-webkit-scrollbar { display:none; }
    .v-chip { background:var(--s2); border:1px solid var(--border); border-radius:20px; padding:5px 13px; font-size:11px; font-family:'Orbitron',monospace; letter-spacing:1px; color:var(--muted2); cursor:pointer; white-space:nowrap; transition:all .2s; }
    .v-chip:hover { border-color:var(--border2); color:var(--text); }
    .v-chip.active { background:var(--red-dim); border-color:var(--red); color:var(--red); box-shadow:0 0 10px rgba(232,33,39,.2); }

    #battery-block { padding:14px 22px; border-bottom:1px solid var(--border); }
    .bat-top { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:8px; }
    .bat-pct { font-family:'Orbitron',monospace; font-size:22px; font-weight:600; color:var(--green); }
    .bat-range { font-size:12px; color:var(--muted2); }
    .bat-range b { color:var(--text); font-weight:500; }
    .bat-track { height:6px; background:var(--s3); border-radius:4px; overflow:hidden; margin-bottom:10px; }
    .bat-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#27ae60,#2ecc71); transition:width .5s ease; }
    .bat-slider-row { display:flex; align-items:center; gap:10px; }
    .bat-slider-row label { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }
    .bat-slider-row input[type=range] { flex:1; -webkit-appearance:none; height:4px; background:var(--s3); border-radius:2px; outline:none; cursor:pointer; }
    .bat-slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; background:var(--green); border-radius:50%; box-shadow:0 0 8px rgba(46,204,113,.5); }

    #route-form { padding:16px 22px; border-bottom:1px solid var(--border); }
    .input-wrap { position:relative; margin-bottom:8px; }
    .dot { position:absolute; left:13px; top:50%; transform:translateY(-50%); width:8px; height:8px; border-radius:50%; z-index:2; pointer-events:none; }
    .dot.start { background:var(--blue); box-shadow:0 0 8px var(--blue); }
    .dot.end { background:var(--red); box-shadow:0 0 8px var(--red-glow); }
    .v-line { width:1px; height:10px; background:var(--border2); margin:0 0 8px 17px; }
    .input-wrap input { width:100%; background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:11px 12px 11px 32px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px; outline:none; transition:border-color .15s,background .15s; }
    .input-wrap input:focus { border-color:var(--border2); background:var(--s3); }
    .input-wrap input::placeholder { color:var(--muted); }
    .suggestions { position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--s3); border:1px solid var(--border2); border-radius:10px; z-index:9999; max-height:200px; overflow-y:auto; display:none; box-shadow:0 12px 40px rgba(0,0,0,.6); }
    .suggestions.open { display:block; }
    .sug-item { padding:9px 14px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s; }
    .sug-item:last-child { border-bottom:none; }
    .sug-item:hover { background:rgba(255,255,255,.04); }
    .sug-name { color:var(--text); }
    .sug-sub { color:var(--muted2); font-size:11px; margin-top:2px; }

    #go-btn { width:100%; padding:12px; background:var(--red); border:none; border-radius:10px; color:#fff; font-family:'Orbitron',monospace; font-size:11px; font-weight:600; letter-spacing:3px; cursor:pointer; transition:all .2s; box-shadow:0 0 20px rgba(232,33,39,.22); }
    #go-btn:hover { background:#ff2d34; box-shadow:0 0 32px rgba(232,33,39,.5); transform:translateY(-1px); }
    #go-btn:active { transform:translateY(0); }

    #reset-btn { display:none; width:100%; margin-top:8px; padding:9px; background:transparent; border:1px solid var(--border2); border-radius:10px; color:var(--muted2); font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; transition:all .2s; }
    #reset-btn:hover { color:var(--text); border-color:rgba(255,255,255,.2); }
    #reset-btn.show { display:block; }

    #route-stats { padding:14px 22px; border-bottom:1px solid var(--border); display:none; }
    #route-stats.show { display:block; }
    .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .stat { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:12px 8px; text-align:center; }
    .stat-val { font-family:'Orbitron',monospace; font-size:14px; font-weight:600; }
    .stat-val.ok { color:var(--green); }
    .stat-val.warn { color:#f39c12; }
    .stat-val.bad { color:var(--red); }
    .stat-val.plain { color:var(--text); }
    .stat-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
    .charge-warn { display:none; margin-top:10px; background:rgba(232,33,39,.1); border:1px solid rgba(232,33,39,.3); border-radius:8px; padding:10px 14px; font-size:12px; color:#f88; line-height:1.5; }
    .charge-warn.show { display:block; }

    #steps-panel { flex:1; overflow-y:auto; padding:14px 22px; }
    #steps-panel::-webkit-scrollbar { width:3px; }
    #steps-panel::-webkit-scrollbar-thumb { background:var(--s3); }
    .steps-title { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
    .step { display:flex; gap:12px; padding:9px 0; border-bottom:1px solid var(--border); align-items:flex-start; animation:fadeIn .3s ease both; }
    .step:last-child { border-bottom:none; }
    .step-icon { width:26px; height:26px; min-width:26px; background:var(--s2); border:1px solid var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:12px; }
    .step-text { font-size:13px; color:#ccc; line-height:1.4; }
    .step-dist { font-size:11px; color:var(--muted2); margin-top:3px; }

    /* MAP */
    #map-area { flex:1; position:relative; overflow:hidden; }
    #map { width:100%; height:100%; }

    #top-pill { position:absolute; top:16px; left:50%; transform:translateX(-50%); background:rgba(8,8,8,.88); backdrop-filter:blur(16px); border:1px solid var(--border2); border-radius:40px; padding:8px 22px; z-index:200; display:flex; align-items:center; gap:18px; font-size:12px; white-space:nowrap; box-shadow:0 4px 30px rgba(0,0,0,.5); }
    .pill-item { display:flex; align-items:center; gap:7px; color:var(--muted2); }
    .pill-val { font-family:'Orbitron',monospace; font-size:11px; color:var(--text); }
    .pill-sep { color:var(--border2); }

    #locate-btn { position:absolute; bottom:24px; left:16px; z-index:200; width:42px; height:42px; background:rgba(8,8,8,.88); backdrop-filter:blur(12px); border:1px solid var(--border2); border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; transition:all .2s; color:var(--blue); }
    #locate-btn:hover { border-color:var(--blue); box-shadow:0 0 14px rgba(68,170,255,.4); }

    #style-toggle { position:absolute; bottom:24px; right:16px; z-index:200; display:flex; flex-direction:column; gap:8px; }
    .map-btn { width:42px; height:42px; background:rgba(8,8,8,.88); backdrop-filter:blur(12px); border:1px solid var(--border2); border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:17px; transition:all .2s; color:var(--muted2); }
    .map-btn:hover { border-color:var(--red); color:var(--red); box-shadow:0 0 12px var(--red-glow); }
    .map-btn.active { border-color:var(--red); color:var(--red); background:var(--red-dim); }

    #loading { display:none; position:fixed; inset:0; background:rgba(8,8,8,.7); backdrop-filter:blur(4px); z-index:9000; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
    #loading.show { display:flex; }
    .spinner { width:40px; height:40px; border:2px solid var(--border2); border-top-color:var(--red); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:3px; color:var(--muted2); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* MapLibre overrides */
    .maplibregl-ctrl-attrib { background:rgba(8,8,8,.7)!important; color:#444!important; }
    .maplibregl-ctrl-attrib a { color:#666!important; }
    .maplibregl-popup-content { background:var(--s2)!important; color:var(--text)!important; border:1px solid var(--border2)!important; border-radius:10px!important; font-family:'DM Sans',sans-serif!important; font-size:13px!important; padding:10px 14px!important; box-shadow:0 8px 30px rgba(0,0,0,.5)!important; }
    .maplibregl-popup-tip { border-top-color:var(--s2)!important; }
  </style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div id="header">
      <div class="logo-row">
        <span class="logo-t">T</span>
        <span class="logo-text">TESLA</span>
      </div>
      <div class="logo-tag">Navigation System</div>
    </div>

    <div id="vehicle-bar">
      <div class="v-chip active" onclick="selectModel(this,600)">Model S</div>
      <div class="v-chip" onclick="selectModel(this,576)">Model 3</div>
      <div class="v-chip" onclick="selectModel(this,534)">Model X</div>
      <div class="v-chip" onclick="selectModel(this,505)">Model Y</div>
      <div class="v-chip" onclick="selectModel(this,750)">Cybertruck</div>
    </div>

    <div id="battery-block">
      <div class="bat-top">
        <span class="bat-pct" id="bat-pct">78%</span>
        <span class="bat-range">Autonomie : <b id="bat-km">468 km</b></span>
      </div>
      <div class="bat-track"><div class="bat-fill" id="bat-fill" style="width:78%"></div></div>
      <div class="bat-slider-row">
        <label>Batterie</label>
        <input type="range" id="bat-slider" min="5" max="100" value="78" oninput="updateBattery(this.value)" />
      </div>
    </div>

    <div id="route-form">
      <div class="input-wrap">
        <div class="dot start"></div>
        <input id="input-origin" type="text" placeholder="Départ…" autocomplete="off"
               oninput="onInput(this,'origin')" onfocus="showSug('origin')" />
        <div class="suggestions" id="sug-origin"></div>
      </div>
      <div class="v-line"></div>
      <div class="input-wrap">
        <div class="dot end"></div>
        <input id="input-dest" type="text" placeholder="Destination…" autocomplete="off"
               oninput="onInput(this,'dest')" onfocus="showSug('dest')" />
        <div class="suggestions" id="sug-dest"></div>
      </div>
      <button id="go-btn" onclick="calcRoute()">⚡ CALCULER L'ITINÉRAIRE</button>
      <button id="reset-btn" onclick="resetRoute()">✕ Effacer l'itinéraire</button>
    </div>

    <div id="route-stats">
      <div class="stats-grid">
        <div class="stat"><div class="stat-val plain" id="s-dist">—</div><div class="stat-lbl">Distance</div></div>
        <div class="stat"><div class="stat-val plain" id="s-time">—</div><div class="stat-lbl">Durée</div></div>
        <div class="stat"><div class="stat-val ok" id="s-batt">—</div><div class="stat-lbl">Batterie arr.</div></div>
      </div>
      <div class="charge-warn" id="charge-warn">⚠️ Autonomie insuffisante pour cet itinéraire. Prévoir une recharge.</div>
    </div>

    <div id="steps-panel">
      <div class="steps-title" id="steps-title">Entrez un itinéraire pour commencer</div>
      <div id="steps-list"></div>
    </div>

  </div>

  <!-- MAP -->
  <div id="map-area">
    <div id="map"></div>

    <div id="top-pill">
      <div class="pill-item">📍 <span class="pill-val" id="pill-loc">Paris, France</span></div>
      <span class="pill-sep">|</span>
      <div class="pill-item">🕐 <span class="pill-val" id="pill-time">—</span></div>
      <span class="pill-sep">|</span>
      <div class="pill-item">🔋 <span class="pill-val" id="pill-batt">78%</span></div>
    </div>

    <button id="locate-btn" title="Ma position" onclick="locateMe()">◎</button>

    <div id="style-toggle">
      <button class="map-btn active" id="btn-dark"   title="Nuit"    onclick="setStyle('dark')">🌙</button>
      <button class="map-btn"        id="btn-bright" title="Jour"    onclick="setStyle('bright')">☀️</button>
      <button class="map-btn"        id="btn-topo"   title="Relief"  onclick="setStyle('topo')">🗺</button>
    </div>
  </div>

</div>

<div id="loading"><div class="spinner"></div><div class="loading-text">CALCUL EN COURS…</div></div>

<script>
// ── Map styles via OpenFreeMap (libre, sans clé) ──
const STYLES = {
  dark:   'https://tiles.openfreemap.org/styles/dark',
  bright: 'https://tiles.openfreemap.org/styles/bright',
  topo:   'https://tiles.openfreemap.org/styles/liberty'
};

let map, coords = { origin: null, dest: null };
let maxRange = 600, battery = 78;
let routeActive = false, userMarker = null;
let originMarker = null, destMarker = null;

// Init MapLibre
map = new maplibregl.Map({
  container: 'map',
  style: STYLES.dark,
  center: [2.3522, 48.8566],
  zoom: 11,
  pitch: 40,
  bearing: 0
});

map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right');

map.on('load', addRouteLayers);

function addRouteLayers() {
  if (!map.getSource('route')) {
    map.addSource('route', { type: 'geojson', data: emptyGeo() });
    map.addLayer({ id: 'route-glow', type: 'line', source: 'route',
      paint: { 'line-color': '#e82127', 'line-width': 16, 'line-opacity': 0.15, 'line-blur': 10 }
    });
    map.addLayer({ id: 'route-line', type: 'line', source: 'route',
      paint: { 'line-color': '#e82127', 'line-width': 4, 'line-opacity': 0.95 },
      layout: { 'line-cap': 'round', 'line-join': 'round' }
    });
  }
}

function emptyGeo() {
  return { type: 'FeatureCollection', features: [] };
}

// ── Clock ──
function tick() {
  const n = new Date();
  document.getElementById('pill-time').textContent =
    n.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}
tick(); setInterval(tick, 30000);

// ── Battery ──
function selectModel(el, range) {
  document.querySelectorAll('.v-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  maxRange = range;
  updateBattery(battery);
}

function updateBattery(val) {
  battery = parseInt(val);
  const km = Math.round(maxRange * battery / 100);
  document.getElementById('bat-pct').textContent = battery + '%';
  document.getElementById('bat-km').textContent = km + ' km';
  document.getElementById('bat-fill').style.width = battery + '%';
  document.getElementById('pill-batt').textContent = battery + '%';
  const fill = document.getElementById('bat-fill');
  fill.style.background = battery > 50 ? 'linear-gradient(90deg,#27ae60,#2ecc71)' :
                          battery > 20 ? 'linear-gradient(90deg,#d35400,#f39c12)' :
                                         'linear-gradient(90deg,#c0392b,#e82127)';
  document.getElementById('bat-pct').style.color =
    battery > 50 ? 'var(--green)' : battery > 20 ? '#f39c12' : 'var(--red)';
  if (routeActive) recalcBattStats();
}

// ── Geocoding Nominatim ──
let debounce = {};

async function onInput(el, field) {
  clearTimeout(debounce[field]);
  const q = el.value.trim();
  if (q.length < 3) { closeSug(field); return; }
  debounce[field] = setTimeout(async () => {
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&accept-language=fr`);
      const data = await r.json();
      renderSug(field, data);
    } catch(e) {}
  }, 300);
}

function renderSug(field, items) {
  const box = document.getElementById('sug-' + field);
  if (!items.length) { box.classList.remove('open'); return; }
  box.innerHTML = items.map(it => {
    const parts = it.display_name.split(',');
    return `<div class="sug-item" onclick="pickSug('${field}',${it.lon},${it.lat},this)">
      <div class="sug-name">${parts[0]}</div>
      <div class="sug-sub">${parts.slice(1,3).join(',').trim()}</div>
    </div>`;
  }).join('');
  box.classList.add('open');
}

function pickSug(field, lon, lat, el) {
  coords[field] = [parseFloat(lon), parseFloat(lat)];
  const name = el.querySelector('.sug-name').textContent;
  document.getElementById('input-' + field).value = name;
  closeSug(field);

  // Add/replace marker
  if (field === 'origin') {
    if (originMarker) originMarker.remove();
    originMarker = new maplibregl.Marker({ color: '#44aaff' })
      .setLngLat(coords[field])
      .setPopup(new maplibregl.Popup({ offset: 25 }).setHTML(`<b>Départ</b><br>${name}`))
      .addTo(map);
    document.getElementById('pill-loc').textContent = name;
    map.flyTo({ center: coords[field], zoom: 12, duration: 800 });
  } else {
    if (destMarker) destMarker.remove();
    destMarker = new maplibregl.Marker({ color: '#e82127' })
      .setLngLat(coords[field])
      .setPopup(new maplibregl.Popup({ offset: 25 }).setHTML(`<b>Destination</b><br>${name}`))
      .addTo(map);
  }
}

function showSug(field) {
  const box = document.getElementById('sug-' + field);
  if (box.innerHTML) box.classList.add('open');
}

function closeSug(field) {
  document.getElementById('sug-' + field).classList.remove('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap')) { closeSug('origin'); closeSug('dest'); }
});

// ── Route via OSRM ──
async function calcRoute() {
  if (!coords.origin || !coords.dest) {
    alert('Veuillez sélectionner un départ et une destination via la liste de suggestions.'); return;
  }
  document.getElementById('loading').classList.add('show');
  const [ox, oy] = coords.origin;
  const [dx, dy] = coords.dest;
  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${ox},${oy};${dx},${dy}?overview=full&geometries=geojson&steps=true`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.code !== 'Ok') throw new Error('Pas de route');

    const route = data.routes[0];
    const geo = route.geometry;

    map.getSource('route').setData(geo);

    const allCoords = geo.coordinates;
    const bounds = allCoords.reduce((b,c) => b.extend(c),
      new maplibregl.LngLatBounds(allCoords[0], allCoords[0]));
    map.fitBounds(bounds, { padding: { top: 60, bottom: 80, left: 60, right: 60 }, duration: 1000 });

    const distKm = (route.distance / 1000).toFixed(1);
    const totalSec = route.duration;
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const timeStr = h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${m} min`;

    document.getElementById('s-dist').textContent = distKm + ' km';
    document.getElementById('s-time').textContent = timeStr;
    document.getElementById('route-stats').classList.add('show');
    document.getElementById('reset-btn').classList.add('show');
    routeActive = true;

    recalcBattStats(parseFloat(distKm));
    renderSteps(route.legs[0].steps);
  } catch(e) {
    alert('Impossible de calculer l\'itinéraire. Vérifiez votre connexion internet.');
  } finally {
    document.getElementById('loading').classList.remove('show');
  }
}

function recalcBattStats(distKm) {
  if (distKm === undefined) {
    distKm = parseFloat(document.getElementById('s-dist').textContent);
  }
  const kmAvail = Math.round(maxRange * battery / 100);
  const pctAfter = Math.round((kmAvail - distKm) / maxRange * 100);
  const el = document.getElementById('s-batt');
  el.textContent = Math.max(0, pctAfter) + '%';
  el.className = 'stat-val ' + (pctAfter < 0 ? 'bad' : pctAfter < 20 ? 'warn' : 'ok');
  document.getElementById('charge-warn').classList.toggle('show', pctAfter < 10);
}

// ── Step icons ──
const ICONS = {
  depart:'🚗', arrive:'📍', 'turn-right':'→', 'turn-left':'←',
  'turn-slight right':'↗', 'turn-slight left':'↖',
  'turn-sharp right':'⇒', 'turn-sharp left':'⇐',
  uturn:'↩', roundabout:'🔄', merge:'⤵', straight:'↑', continue:'↑', fork:'⑂'
};

function getIcon(s) {
  const t = s.maneuver.type, mod = s.maneuver.modifier;
  return ICONS[`${t}-${mod}`] || ICONS[`${t} ${mod}`] || ICONS[t] || '•';
}

const FR = { right:'à droite', left:'à gauche', 'slight right':'légèrement à droite',
  'slight left':'légèrement à gauche', 'sharp right':'fortement à droite',
  'sharp left':'fortement à gauche', uturn:'demi-tour', straight:'tout droit' };

function renderSteps(steps) {
  document.getElementById('steps-title').textContent = steps.length + ' étapes';
  document.getElementById('steps-list').innerHTML = steps.map((s, i) => {
    const d = s.distance >= 1000 ? (s.distance/1000).toFixed(1)+' km' : Math.round(s.distance)+' m';
    const n = s.name || s.ref || '';
    const mod = s.maneuver.modifier || '';
    let inst = s.maneuver.type === 'depart' ? `Départ${n?' : '+n:''}` :
               s.maneuver.type === 'arrive' ? `Arrivée${n?' : '+n:''}` :
               mod ? `Tourner ${FR[mod]||mod}${n?' sur '+n:''}` : `Continuer${n?' sur '+n:''}`;
    return `<div class="step" style="animation-delay:${i*25}ms">
      <div class="step-icon">${getIcon(s)}</div>
      <div>
        <div class="step-text">${inst}</div>
        <div class="step-dist">${d}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Reset ──
function resetRoute() {
  coords = { origin: null, dest: null };
  routeActive = false;
  ['input-origin','input-dest'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('route-stats').classList.remove('show');
  document.getElementById('reset-btn').classList.remove('show');
  document.getElementById('steps-list').innerHTML = '';
  document.getElementById('steps-title').textContent = 'Entrez un itinéraire pour commencer';
  if (map.getSource('route')) map.getSource('route').setData(emptyGeo());
  if (originMarker) { originMarker.remove(); originMarker = null; }
  if (destMarker) { destMarker.remove(); destMarker = null; }
}

// ── Locate me ──
function locateMe() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const { longitude: lng, latitude: lat } = pos.coords;
    map.flyTo({ center: [lng, lat], zoom: 14, duration: 1000 });
    if (userMarker) userMarker.remove();
    const el = document.createElement('div');
    el.style.cssText = 'width:14px;height:14px;background:#44aaff;border:2px solid #fff;border-radius:50%;box-shadow:0 0 14px rgba(68,170,255,.8)';
    userMarker = new maplibregl.Marker({ element: el })
      .setLngLat([lng, lat])
      .setPopup(new maplibregl.Popup({ offset: 20 }).setHTML('<b>Ma position</b>'))
      .addTo(map);
    if (!coords.origin) {
      coords.origin = [lng, lat];
      document.getElementById('input-origin').value = 'Ma position';
      document.getElementById('pill-loc').textContent = 'Ma position';
    }
  }, () => alert('Géolocalisation non disponible.'));
}

// ── Style switch ──
function setStyle(s) {
  document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + s).classList.add('active');
  map.setStyle(STYLES[s]);
  map.once('styledata', () => { addRouteLayers(); });
}
</script>
